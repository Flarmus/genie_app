<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Engee Copilot</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --user-bubble: #dbeafe;
        --api-bubble: #f3f4f6;
        --button: #111827;
        --button-text: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e5e7eb;
        color: var(--text);
        font-family: "Segoe UI", Arial, sans-serif;
      }

      .app {
        width: 600px;
        height: 775px;
        max-width: 100vw;
        max-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        border: 1px solid var(--line);
      }

      .header {
        flex: 0 0 auto;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        font-size: 20px;
        font-weight: 600;
      }

      .chat {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        padding: 18px 18px 10px;
      }

      .message-row {
        display: flex;
        margin-bottom: 12px;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-row.api {
        justify-content: flex-start;
      }

      .bubble {
        max-width: 78%;
        padding: 10px 13px;
        border-radius: 16px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 14px;
        line-height: 1.45;
      }

      .user .bubble {
        background: var(--user-bubble);
        border-bottom-right-radius: 5px;
      }

      .api .bubble {
        background: var(--api-bubble);
        border-bottom-left-radius: 5px;
      }

      .input-area {
        flex: 0 0 auto;
        display: flex;
        gap: 10px;
        padding: 14px;
        border-top: 1px solid var(--line);
        background: #ffffff;
      }

      textarea {
        flex: 1 1 auto;
        height: 44px;
        max-height: 120px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        color: var(--text);
        font: inherit;
        resize: none;
        outline: none;
      }

      textarea:focus {
        border-color: #9ca3af;
      }

      button {
        flex: 0 0 auto;
        height: 44px;
        padding: 0 16px;
        border: none;
        border-radius: 12px;
        background: var(--button);
        color: var(--button-text);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      .empty {
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">Engee Copilot</header>

      <section id="chat" class="chat" aria-live="polite">
        <div id="empty" class="empty">Введите сообщение, чтобы начать диалог.</div>
      </section>

      <form id="message-form" class="input-area">
        <textarea id="prompt" placeholder="Напишите сообщение..." rows="1"></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </main>

    <script>
      const chat = document.getElementById("chat");
      const empty = document.getElementById("empty");
      const form = document.getElementById("message-form");
      const promptField = document.getElementById("prompt");
      const sendButton = document.getElementById("send");

      function scrollChatToBottom() {
        chat.scrollTop = chat.scrollHeight;
      }

      function addMessage(role, text) {
        empty.hidden = true;

        const row = document.createElement("div");
        row.className = "message-row " + role;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        row.appendChild(bubble);
        chat.appendChild(row);
        scrollChatToBottom();
      }

      async function sendPrompt() {
        const prompt = promptField.value.trim();
        if (!prompt) {
          return;
        }

        addMessage("user", prompt);
        promptField.value = "";
        sendButton.disabled = true;

        try {
          const response = await fetch("/script/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt }),
          });

          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const data = await response.json();
          addMessage("api", data.script ?? "");
        } catch (err) {
          addMessage("api", "Ошибка: " + err.message);
        } finally {
          sendButton.disabled = false;
          promptField.focus();
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        sendPrompt();
      });

      promptField.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });
    </script>
  </body>
</html>
